{{ with .Params.pcSpecsTitle }}
    <h2 class="section-title section-title--compact">{{ . }}</h2>
{{ end }}

<section class="pc-specs-grid">
    <div class="pc-specs-block">
        <div class="pc-specs-block__header">
            <h3 class="pc-specs-block__subtitle">{{ .Params.pcSpecsColumnTitle | default "Hardware" }}</h3>
            <div class="pc-specs-block__icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-device-desktop" width="24" height="24" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M3 5a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v8a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2z" />
                    <path d="M7 20h10" />
                    <path d="M9 16v4" />
                    <path d="M15 16v4" />
                </svg>
            </div>
        </div>

        <div class="pc-specs-block__content">
            <div class="pc-specs-block__list">
                {{ range .Params.pcSpecs }}
                    <div class="pc-specs-block__item">
                        <span class="pc-specs-block__label">{{ .label }}</span>
                        <span class="pc-specs-block__value">{{ .value }}</span>
                    </div>
                {{ end }}
            </div>
        </div>
    </div>

    <div class="pc-specs-block">
        <div class="pc-specs-block__header">
            <h3 class="pc-specs-block__subtitle">{{ .Params.peripheralsTitle | default "Peripherals" }}</h3>
            <div class="pc-specs-block__icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-device-gamepad-2" width="24" height="24" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                    <path d="M12 5h3.5a5 5 0 0 1 4.995 4.783l.5 6a5 5 0 0 1 -5.448 5.39l-3.547 -.173l-3.547 .173a5 5 0 0 1 -5.448 -5.39l.5 -6a5 5 0 0 1 4.995 -4.783h3.5z" />
                    <path d="M6 10h4" />
                    <path d="M8 8v4" />
                    <path d="M15 11h.01" />
                    <path d="M18 10h.01" />
                </svg>
            </div>
        </div>

        <div class="pc-specs-block__content">
            <div class="pc-specs-block__list">
                {{ range .Params.peripherals }}
                    <div class="pc-specs-block__item">
                        <span class="pc-specs-block__label">{{ .label }}</span>
                        <span class="pc-specs-block__value">{{ .value }}</span>
                    </div>
                {{ end }}
            </div>
        </div>
    </div>
</section>
